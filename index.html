<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bab Kita — Sampul Buku</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Great+Vibes&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="index-page">
  <div class="loader" aria-live="polite">
    <div class="loader-cloud-scene" aria-hidden="true">
      <div class="loader-cloud cloud-one"></div>
      <div class="loader-cloud cloud-two"></div>
      <div class="loader-cloud cloud-three"></div>
      <div class="loader-cloud cloud-four"></div>
      <div class="loader-split">
        <div class="split-half split-left"></div>
        <div class="split-half split-right"></div>
      </div>
    </div>
    <div class="loader-message">
      <p class="loader-title">Selamat Datang Di Kenangan Kita</p>
    </div>
  </div>

  <div class="bg-decor" aria-hidden="true">
    <div class="floating-hearts"></div>
    <div class="floating-sparkles"></div>
  </div>

  <main id="book">
    <section id="cover" class="page cover-page">
      <div class="cover-corner cover-corner-tl"></div>
      <div class="cover-corner cover-corner-tr"></div>
      <div class="cover-corner cover-corner-bl"></div>
      <div class="cover-corner cover-corner-br"></div>
      <div class="cover-frame">
        <div class="cover-ornament top">✦ ❧ ✦</div>
        <div class="cover-texture" aria-hidden="true"></div>
        <div class="cover-emboss" aria-hidden="true"><span>Bab Kita</span></div>
        <div class="cover-decor" aria-hidden="true">
          <svg width="120" height="24" viewBox="0 0 120 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M4 12c6-6 18-6 24 0 6-6 18-6 24 0 6-6 18-6 24 0" stroke="rgba(232,213,163,0.35)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <!-- Cover overlay: moon + falling decor -->
        <div class="cover-overlay" aria-hidden="true">
          <div class="moon" aria-hidden="true"></div>
          <div class="falling-container" aria-hidden="true"></div>
        </div>
        <p class="cover-label">Sebuah Buku Kenangan</p>
        <h1 class="cover-title">Tentang Bab Kita</h1>
        <p class="cover-subtitle">Cerita tentang kita berdua,<br>ditulis dengan cinta.</p>
        <div class="cover-divider">
          <span></span>
          <span class="cover-heart">♥</span>
          <span></span>
        </div>
        <p class="cover-dedication">Untuk kamu,<br>yang selalu jadi alasan senyumku.</p>
        <a href="book.html" target="_blank" rel="noopener noreferrer" class="btn-open">Buka Buku</a>
        <p class="cover-date">Dibuat dengan cinta · 21 Juli 2026</p>
        <div class="cover-ornament top">✦ ❧ ✦</div>
      </div>
    </section>
  </main>

  <script>
    const loader = document.querySelector('.loader');
    const book = document.getElementById('book');

    if (loader && book) {
      window.addEventListener('load', () => {
        setTimeout(() => {
          loader.classList.add('is-opening');
          setTimeout(() => {
            loader.classList.add('fade-out');
            book.classList.add('content-ready');
            setTimeout(() => loader.remove(), 900);
          }, 2200);
        }, 300);
      });
    }
  </script>
</body>
</html>
